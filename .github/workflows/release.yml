name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # 构建跨平台二进制
  build-binaries:
    name: Build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
          - os: windows
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          VERSION=${GITHUB_REF_NAME}
          EXT=""
          if [ "${{ matrix.os }}" = "windows" ]; then
            EXT=".exe"
          fi
          OUTPUT="weclaw-proxy-${{ matrix.os }}-${{ matrix.arch }}${EXT}"
          go build -ldflags="-s -w -X main.version=${VERSION}" -o "${OUTPUT}" ./cmd/weclaw-proxy/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: weclaw-proxy-${{ matrix.os }}-${{ matrix.arch }}
          path: weclaw-proxy-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.os == 'windows' && '.exe' || '' }}

  # 构建并推送 Docker 多架构镜像
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 创建 GitHub Release
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-binaries, build-docker]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/weclaw-proxy-*; do
            cp "$dir"/* release/
          done
          cd release
          for f in *; do
            sha256sum "$f" >> checksums.txt
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## 🚀 WeClaw-Proxy ${{ github.ref_name }}

            WeClaw-Proxy 是一个微信开放平台代理适配器，让外部 AI Agent 可以直接对接微信。

            ### 📦 安装方式

            **二进制下载**

            从下方 Assets 中下载对应平台的二进制文件：

            | 平台 | AMD64 | ARM64 |
            |------|-------|-------|
            | Linux | `weclaw-proxy-linux-amd64` | `weclaw-proxy-linux-arm64` |
            | macOS | `weclaw-proxy-darwin-amd64` | `weclaw-proxy-darwin-arm64` |
            | Windows | `weclaw-proxy-windows-amd64.exe` | `weclaw-proxy-windows-arm64.exe` |

            ```bash
            chmod +x weclaw-proxy-*
            ./weclaw-proxy-linux-amd64 --config config.yaml
            ```

            **Docker**

            ```bash
            docker run -d \
              -v ./config.yaml:/data/config.yaml \
              -p 8080:8080 \
              ghcr.io/amigoer/weclaw-proxy:${{ github.ref_name }}
            ```

            ### 🔐 校验

            所有二进制附带 `checksums.txt`（SHA256），请在下载后校验完整性。

            ---

          files: release/*
